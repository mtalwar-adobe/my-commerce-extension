extensions:
  commerce/extensibility/1:
    $include: src/commerce-extensibility-1/ext.config.yaml
  commerce/backend-ui/1:
    $include: src/commerce-backend-ui-1/ext.config.yaml

application:
  actions: actions
  web: web-src
  runtimeManifest:
    packages:
      my-commerce-extension:
        license: Apache-2.0
        actions:
          product-enrichment:
            function: actions/product-enrichment/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: info
              COMMERCE_STORE_CODE: $COMMERCE_STORE_CODE
              COMMERCE_API_BASE_URL: $COMMERCE_API_BASE_URL
              IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
              IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
              IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
              IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
              IMS_TOKEN_URL: $IMS_TOKEN_URL
            annotations:
              require-adobe-auth: false
              final: true
              include-ims-credentials: true
          order-event-consumer:
            function: actions/order-event-consumer/index.js
            web: 'no'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: info
              COMMERCE_STORE_CODE: $COMMERCE_STORE_CODE
              COMMERCE_API_BASE_URL: $COMMERCE_API_BASE_URL
              IMS_OAUTH_S2S_ORG_ID: $IMS_OAUTH_S2S_ORG_ID
              IMS_OAUTH_S2S_CLIENT_ID: $IMS_OAUTH_S2S_CLIENT_ID
              IMS_OAUTH_S2S_CLIENT_SECRET: $IMS_OAUTH_S2S_CLIENT_SECRET
              IMS_OAUTH_S2S_SCOPES: $IMS_OAUTH_S2S_SCOPES
              IMS_TOKEN_URL: $IMS_TOKEN_URL
            annotations:
              require-adobe-auth: false
              final: true
              include-ims-credentials: true
          validate-product:
            function: actions/validate-product/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
            limits:
              timeout: 60000
              memorySize: 256
            annotations:
              require-adobe-auth: false
              final: true
